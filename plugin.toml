[plugin]
name = "fledge-stats"
version = "0.1.0"
description = "Project statistics — LOC, file counts, git activity, and change tracking"
author = "CorvidLabs"
protocol = "fledge-v1"

[[commands]]
name = "stats"
description = "Show project statistics"
binary = "target/release/fledge-stats"

[hooks]
build = "cargo build --release"
